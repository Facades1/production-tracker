
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Production Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Bootstrap & DataTables CSS (CDN) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/v/bs5/dt-2.0.7/fh-4.0.1/r-3.0.3/b-3.1.2/datatables.min.css" rel="stylesheet">

  <style>
    body { padding: 16px; }
    .filter-bar .form-control { height: 36px; }
    .table thead th { white-space: nowrap; }
    .dt-buttons .btn { margin-right: 6px; }
  </style>
</head>
<body>

  <h4 class="mb-3">Production Tracker</h4>

  <!-- Top Filters -->
  <div class="filter-bar row g-2 align-items-end mb-2">
    <div class="col-6 col-md-2">
      <label class="form-label">Date</label>
      <input type="date" id="fDate" class="form-control">
    </div>
    <div class="col-6 col-md-2">
      <label class="form-label">Zone</label>
      <input type="text" id="fZone" class="form-control" placeholder="e.g., Z1">
    </div>
    <div class="col-6 col-md-2">
      <label class="form-label">Scope</label>
      <input type="text" id="fScope" class="form-control" placeholder="Facade / ...">
    </div>
    <div class="col-6 col-md-2">
      <label class="form-label">Batch Qty</label>
      <input type="number" id="fBatchQty" class="form-control" placeholder="≥ value">
    </div>
    <div class="col-6 col-md-2">
      <label class="form-label">PI NO</label>
      <input type="text" id="fPiNo" class="form-control" placeholder="PI…">
    </div>
    <div class="col-6 col-md-2">
      <label class="form-label">Actual Qty</label>
      <input type="number" id="fActualQty" class="form-control" placeholder="≥ value">
    </div>
    <div class="col-6 col-md-2">
      <label class="form-label">HO Qty</label>
      <input type="number" id="fHoQty" class="form-control" placeholder="≥ value">
    </div>
    <div class="col-6 col-md-2">
      <button id="btnSearch" class="btn btn-primary w-100">Search</button>
    </div>
    <div class="col-6 col-md-2">
      <button id="btnReset" class="btn btn-outline-secondary w-100">Reset</button>
    </div>
  </div>

  <!-- Data Table -->
  <div class="table-responsive">
    <table id="prodTable" class="table table-striped table-bordered table-sm" style="width:100%">
      <thead class="table-light">
        <tr>
          <th>SL.no</th>
          <th>Date</th>
          <th>Zone</th>
          <th>Scope</th>
          <th>Engineer</th>
          <th>Project</th>
          <th>BOQ</th>
          <th>Subproduct-Description</th>
          <th>Typology</th>
          <th>Batch Qty</th>
          <th>CL No</th>
          <th>PI NO</th>
          <th>Actual Qty</th>
          <th>HO Qty</th>
          <th>Actual Sqm</th>
          <th>HO Sqm</th>
        </tr>
      </thead>
      <tbody>
      </tbody>
    </table>
  </div>

  <!-- JS -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.datatables.net/v/bs5/dt-2.0.7/fh-4.0.1/r-3.0.3/b-3.1.2/datatables.min.js"></script>

  <script>
    async function fetchCSV(url) {
      const res = await fetch(url);
      const text = await res.text();
      const lines = text.trim().split(/?
/);
      if (!lines.length) return [];
      const headers = lines.shift().split(",").map(h => h.trim());
      return lines.map((line, idx) => {
        const cells = line.split(",").map(c => c.trim());
        const row = {};
        headers.forEach((h, i) => row[h] = cells[i] ?? "");
        if (!row["SL.no"]) row["SL.no"] = (idx + 1).toString();
        return row;
      });
    }

    let dt;

    async function init() {
      const rows = await fetchCSV("data/data.csv").catch(() => []);
      const toRow = obj => ([
        obj["SL.no"], obj["Date"], obj["Zone"], obj["Scope"], obj["Engineer"], obj["Project"],
        obj["BOQ"], obj["Subproduct-Description"], obj["Typology"], obj["Batch Qty"],
        obj["CL No"], obj["PI NO"], obj["Actual Qty"], obj["HO Qty"], obj["Actual Sqm"], obj["HO Sqm"]
      ]);

      dt = new DataTable('#prodTable', {
        data: rows.map(toRow),
        columns: [
          { title: "SL.no" }, { title: "Date" }, { title: "Zone" }, { title: "Scope" },
          { title: "Engineer" }, { title: "Project" }, { title: "BOQ" },
          { title: "Subproduct-Description" }, { title: "Typology" }, { title: "Batch Qty" },
          { title: "CL No" }, { title: "PI NO" }, { title: "Actual Qty" }, { title: "HO Qty" },
          { title: "Actual Sqm" }, { title: "HO Sqm" }
        ],
        paging: true,
        pageLength: 25,
        responsive: true,
        fixedHeader: true,
        dom: 'Bfrtip',
        buttons: ['copy', 'csv', 'excel', 'print'],
        order: [[1, 'asc']]
      });

      document.getElementById('btnSearch').addEventListener('click', () => {
        const vDate = document.getElementById('fDate').value.trim();
        const vZone = document.getElementById('fZone').value.trim();
        const vScope = document.getElementById('fScope').value.trim();
        const vBatch = document.getElementById('fBatchQty').value.trim();
        const vPi = document.getElementById('fPiNo').value.trim();
        const vAct = document.getElementById('fActualQty').value.trim();
        const vHo = document.getElementById('fHoQty').value.trim();

        dt.columns().search('');

        if (vDate) dt.column(1).search('^' + vDate + '$', true, false);
        if (vZone) dt.column(2).search(vZone, true, false);
        if (vScope) dt.column(3).search(vScope, true, false);
        if (vPi) dt.column(11).search(vPi, true, false);

        $.fn.dataTable.ext.search = [];

        if (vBatch) {
          $.fn.dataTable.ext.search.push((settings, data) => {
            const batch = parseFloat(data[9] || '0');
            return batch >= parseFloat(vBatch);
          });
        }
        if (vAct) {
          $.fn.dataTable.ext.search.push((settings, data) => {
            const act = parseFloat(data[12] || '0');
            return act >= parseFloat(vAct);
          });
        }
        if (vHo) {
          $.fn.dataTable.ext.search.push((settings, data) => {
            const ho = parseFloat(data[13] || '0');
            return ho >= parseFloat(vHo);
          });
        }

        dt.draw();
      });

      document.getElementById('btnReset').addEventListener('click', () => {
        ['fDate','fZone','fScope','fBatchQty','fPiNo','fActualQty','fHoQty'].forEach(id => document.getElementById(id).value = '');
        $.fn.dataTable.ext.search = [];
        dt.search('').columns().search('');
        dt.draw();
      });
    }

    init();
  </script>
</body>
</html>
